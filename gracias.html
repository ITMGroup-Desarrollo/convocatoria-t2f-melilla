<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gracias — Comparte Melilla</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: #e8e8e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-wrapper {
            width: 100%;
            min-height: 100vh;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Textura de fondo */
        .page-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('./imagenes/textura/TTF_textura.png');
            background-repeat: repeat;
            background-size: 100px;
            opacity: 0.15;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 40px;
            max-width: 420px;
            width: 90%;
        }

        /* Círculo morado con check */
        .check-circle {
            width: 90px;
            height: 90px;
            background: #b98fd4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px auto;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            70% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .check-circle svg {
            width: 44px;
            height: 44px;
        }

        /* Título */
        .title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            color: #1a1a1a;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        /* Subtítulo */
        .subtitle {
            font-size: 0.97rem;
            color: #444;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        /* Botón volver */
        .btn-volver {
            background: #1a1a1a;
            color: #93d500;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 9999px;
            padding: 14px 44px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s;
        }

        .btn-volver:hover {
            opacity: 0.82;
        }

        .check-circle img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        /* Desktop */
        @media (min-width: 768px) {
            .card {
                padding: 80px 60px;
                max-width: 500px;
            }

            .title {
                font-size: 2.6rem;
            }

            .subtitle {
                font-size: 1.05rem;
            }

            .check-circle {
                width: 110px;
                height: 110px;
            }

            .check-circle svg {
                width: 54px;
                height: 54px;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div class="card">

            <!-- Círculo con check -->
            <div class="check-circle">
                <img src="./imagenes/check1.png" alt="Confirmación" />
            </div>

            <!-- Texto -->
            <p class="title">Gracias<br>por compartir<br>Melilla</p>
            <p class="subtitle">La información ya está en tu correo<br>¡Escucharás noticias de nosotros pronto!</p>

            <!-- Botón volver -->
            <a href="./index.php" class="btn-volver">Volver</a>

        </div>
    </div>
</body>

</html>
